# Site settings
title: Singularity Clock
email: daynesorvisto@yahoo.ca
url: https://github.com/
description: "An index of high quality tutorials, resources, journals sourced from around thte web."
keywords: "ML Ops, data science, data engineering, machine learning, analytics"
skills: "Tracking highest impact advancements in applied AI research"
meta_author: Singularity Clock

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: a89232 #80B3FF
  primary-rgb: "24,288,156" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Singularity Clock
  social: Around the Web

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: stack-overflow
    url: 
  - title: github
    url: http://github.com/



# Credits content
credits: 'This site was custom coded in Ruby, Python and Javascript'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""


collections:
   blogs:
      output: true
      permalink: /blog/:path/
