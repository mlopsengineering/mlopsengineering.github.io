 <!-- Clock Section -->
    <section class="success" id="clock">
     <style>
            * {
          margin: 0;
          padding: 0;
      }
      .clock {
          position: absolute;
          width: 300px;
          height: 300px;
          border: 20px solid #b06a26;
          border-radius: 50%;
          left: 50%;
          top: 50%;
          background: #fefbf2;
          transform: translate(-50%, -50%);
       
      }

      .clock::before {
          position: absolute;
          content: '';
          height: 130px;
          width: 10px;
          background: black;
          top: 50%;
          left: calc(50% - 5px);
          border-radius: 5px;
          animation: spin 6s linear infinite;
          transform-origin: top;
      }

      .clock::after {
          position: absolute;
          content: '';
          height: 100px;
          width: 10px;
          background: black;
          top: 50%;
          left: calc(50% - 5px);
          border-radius: 5px;
          animation: spin 72s linear infinite;
          transform-origin: top;

      }

      @keyframes spin {
          0% {
              transform: rotate(-180deg)
          }
          100% {
              transform: rotate(180deg)
          }
      }


     </style>
        <div class="container">

                <div class="col-lg-12 text-center">
                    <hr class="star-light">
                    <div class="clock"></div>
                 </br>
                 </br>
                </div>
     </div>
    </section>
